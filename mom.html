<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תשלום לאסתר ומיכאל</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-title">
        <h1>תשלום לאסתר ומיכאל</h1>
      </div>
    </div>
  </header>

  <main>
    <section class="content">
      <div class="card" id="mom-public-card">
        <div id="mom-public-current-month" style="margin-bottom: 12px;"></div>
        <div id="mom-public-net" style="margin-bottom: 12px;"></div>
        <div id="mom-public-yearly" style="margin-bottom: 12px;"></div>
        <div id="mom-public-status" style="margin-bottom: 12px; color: #666;"></div>
        <div id="mom-public-table"></div>
      </div>
    </section>
  </main>

  <script>
    function formatCurrency(value) {
      const num = Number(value || 0);
      return num.toLocaleString('he-IL', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    async function loadMomTable() {
      const statusEl = document.getElementById('mom-public-status');
      const tableEl = document.getElementById('mom-public-table');
      const currentMonthEl = document.getElementById('mom-public-current-month');
      const netEl = document.getElementById('mom-public-net');
      const yearlyEl = document.getElementById('mom-public-yearly');
      if (statusEl) statusEl.textContent = 'טוען נתונים...';

      try {
        const res = await fetch('/public/mom-data');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const rows = data?.rows || [];
        const currentMonthBalance = Number(data?.currentMonthBalance || 0);
        const currentMonthDisplay = data?.currentMonthDisplay || '';
        const netBalance = Number(data?.netBalance || 0);
        const yearlyIncome = Array.isArray(data?.yearlyIncome) ? data.yearlyIncome : [];

        if (currentMonthEl) {
          const balanceColor = currentMonthBalance >= 0 ? '#27ae60' : '#e74c3c';
          currentMonthEl.innerHTML = `
            <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
              <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px;">עודף דוח חודש ${escapeHtml(currentMonthDisplay)}</div>
              <div style="font-size: 22px; font-weight: 700; color: ${balanceColor}; direction: ltr; text-align: left;">₪${formatCurrency(currentMonthBalance)}</div>
            </div>
          `;
        }

        if (netEl) {
          const netColor = netBalance >= 0 ? '#27ae60' : '#e74c3c';
          netEl.innerHTML = `
            <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
              <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px;">נטו אסתר ומיכאל</div>
              <div style="font-size: 22px; font-weight: 700; color: ${netColor}; direction: ltr; text-align: left;">₪${formatCurrency(netBalance)}</div>
            </div>
          `;
        }

        if (yearlyEl) {
          if (yearlyIncome.length === 0) {
            yearlyEl.innerHTML = '';
          } else {
            const maxValue = Math.max(...yearlyIncome.map(item => Math.abs(item.amount || 0)), 1);
            const rowsHtml = yearlyIncome.map(item => {
              const widthPct = Math.round((Math.abs(item.amount || 0) / maxValue) * 100);
              const barColor = 'linear-gradient(135deg, #3498db 0%, #2980b9 100%)';
              return `
                <div style="display: grid; grid-template-columns: 70px 1fr 120px; gap: 12px; align-items: center;">
                  <div style="font-size: 13px; font-weight: 600; color: #333;">${item.year}</div>
                  <div style="height: 18px; background: #eef2f5; border-radius: 8px; overflow: hidden;">
                    <div style="height: 100%; width: ${widthPct}%; background: ${barColor}; border-radius: 8px;"></div>
                  </div>
                  <div style="font-size: 13px; color: #2c3e50; text-align: right; direction: ltr; font-weight: 600;">₪${formatCurrency(item.amount)}</div>
                </div>
              `;
            }).join('');

            yearlyEl.innerHTML = `
              <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
                <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">גרף הכנסות שנתיות - אסתר ומיכאל</div>
                <div style="display: grid; gap: 10px;">
                  ${rowsHtml}
                </div>
              </div>
            `;
          }
        }

        if (!rows.length) {
          if (statusEl) statusEl.textContent = '';
          tableEl.innerHTML = '<div style="text-align:center;color:#999;">אין נתונים</div>';
          return;
        }

        const body = rows.map(row => {
          const balanceColor = row.balance >= 0 ? '#27ae60' : '#e74c3c';
          const cumulativeColor = row.cumulativeBalance >= 0 ? '#27ae60' : '#e74c3c';
          return `
            <tr>
              <td style="white-space:nowrap;">${escapeHtml(row.label)}</td>
              <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.obligation)}</td>
              <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.reductionAmount)}</td>
              <td style="white-space:nowrap;">${escapeHtml(row.reductionReason || '')}</td>
              <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.paid)}</td>
              <td style="color:${balanceColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.balance)}</td>
              <td style="color:${cumulativeColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.cumulativeBalance)}</td>
              <td style="text-align:center;">${row.isExempt ? 'כן' : ''}</td>
            </tr>
          `;
        }).join('');

        tableEl.innerHTML = `
          <table class="payments-table">
            <thead>
              <tr>
                <th>חודש</th>
                <th>התחייבות</th>
                <th>הפחתה</th>
                <th>סיבה</th>
                <th>שולם</th>
                <th>מאזן</th>
                <th>עודף מצטבר</th>
                <th>פטור</th>
              </tr>
            </thead>
            <tbody>
              ${body}
            </tbody>
          </table>
        `;
        if (statusEl) statusEl.textContent = '';
      } catch (err) {
        if (statusEl) statusEl.textContent = 'שגיאה בטעינת נתונים';
        tableEl.innerHTML = '';
      }
    }

    loadMomTable();
  </script>
</body>
</html>
