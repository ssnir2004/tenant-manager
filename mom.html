<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תשלום לאסתר ומיכאל</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-content">
      <div class="header-title">
        <h1>תשלום לאסתר ומיכאל</h1>
      </div>
    </div>
  </header>

  <main>
    <section class="content">
      <div class="card" id="shared-expenses-balance-card">
        <h2 style="margin-top: 0;">יתרה מצטברת מול ההורים</h2>
        <div id="shared-expenses-public-balance"></div>
      </div>

      <div class="card" id="mom-public-card" style="margin-top: 20px;">
        <div id="mom-public-current-month" style="margin-bottom: 12px;"></div>
        <div id="mom-public-net" style="margin-bottom: 12px;"></div>
        <div id="mom-public-yearly" style="margin-bottom: 12px;"></div>
        <div id="mom-public-status" style="margin-bottom: 12px; color: #666;"></div>
        <div id="mom-public-table"></div>
      </div>

      <div class="card" id="shared-expenses-public-card" style="margin-top: 20px;">
        <h2 style="margin-top: 0;">🤝 הוצאות משותפות עם אמא ואבא</h2>
        <div id="shared-expenses-public-status" style="margin-bottom: 12px; color: #666;"></div>

        <h3>הוצאות משותפות</h3>
        <div id="shared-expenses-public-table"></div>

        <h3 style="margin-top: 24px;">כסף שקיבלתי מאמא ואבא</h3>
        <div id="parent-contributions-public-table"></div>
      </div>
    </section>
  </main>

  <script>
    function formatCurrency(value) {
      const num = Number(value || 0);
      return num.toLocaleString('he-IL', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
    }

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    function methodLabel(value) {
      const raw = String(value || '').trim();
      if (raw === 'cash') return 'מזומן';
      if (raw === 'check') return "צ'ק";
      if (raw === 'bit') return 'ביט';
      if (raw === 'transfer') return 'העברה';
      return raw;
    }

    function formatDate(value) {
      const raw = String(value || '').trim();
      const isoMatch = raw.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (isoMatch) return `${isoMatch[3]}/${isoMatch[2]}/${isoMatch[1]}`;
      return raw;
    }

    async function loadMomTable() {
      const statusEl = document.getElementById('mom-public-status');
      const tableEl = document.getElementById('mom-public-table');
      const currentMonthEl = document.getElementById('mom-public-current-month');
      const netEl = document.getElementById('mom-public-net');
      const yearlyEl = document.getElementById('mom-public-yearly');
      if (statusEl) statusEl.textContent = 'טוען נתונים...';

      try {
        const res = await fetch('/public/mom-data');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const rows = data?.rows || [];
        const currentMonthBalance = Number(data?.currentMonthBalance || 0);
        const currentMonthDisplay = data?.currentMonthDisplay || '';
        const totalIncome = Number(data?.totalIncome || 0);
        const yearlyIncome = Array.isArray(data?.yearlyIncome) ? data.yearlyIncome : [];
        const paymentsByMonth = data?.paymentsByMonth || {};

        if (currentMonthEl) {
          const balanceColor = currentMonthBalance >= 0 ? '#27ae60' : '#e74c3c';
          currentMonthEl.innerHTML = `
            <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
              <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px;">עודף דוח חודש ${escapeHtml(currentMonthDisplay)}</div>
              <div style="font-size: 22px; font-weight: 700; color: ${balanceColor}; direction: ltr; text-align: left;">₪${formatCurrency(currentMonthBalance)}</div>
            </div>
          `;
        }

        if (netEl) {
          netEl.innerHTML = `
            <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
              <div style="font-size: 16px; font-weight: 600; margin-bottom: 6px;">סך הכנסות אסתר ומיכאל</div>
              <div style="font-size: 22px; font-weight: 700; color: #2c3e50; direction: ltr; text-align: left;">₪${formatCurrency(totalIncome)}</div>
            </div>
          `;
        }

        if (yearlyEl) {
          if (yearlyIncome.length === 0) {
            yearlyEl.innerHTML = '';
          } else {
            const maxValue = Math.max(...yearlyIncome.map(item => Math.abs(item.amount || 0)), 1);
            const rowsHtml = yearlyIncome.map(item => {
              const widthPct = Math.round((Math.abs(item.amount || 0) / maxValue) * 100);
              const barColor = 'linear-gradient(135deg, #3498db 0%, #2980b9 100%)';
              return `
                <div style="display: grid; grid-template-columns: 70px 1fr 120px; gap: 12px; align-items: center;">
                  <div style="font-size: 13px; font-weight: 600; color: #333;">${item.year}</div>
                  <div style="height: 18px; background: #eef2f5; border-radius: 8px; overflow: hidden;">
                    <div style="height: 100%; width: ${widthPct}%; background: ${barColor}; border-radius: 8px;"></div>
                  </div>
                  <div style="font-size: 13px; color: #2c3e50; text-align: right; direction: ltr; font-weight: 600;">₪${formatCurrency(item.amount)}</div>
                </div>
              `;
            }).join('');

            yearlyEl.innerHTML = `
              <div style="padding: 12px; border-radius: 8px; background: #f8f9fa; border: 1px solid #e9ecef;">
                <div style="font-size: 16px; font-weight: 600; margin-bottom: 10px;">גרף הכנסות שנתיות - אסתר ומיכאל</div>
                <div style="display: grid; gap: 10px;">
                  ${rowsHtml}
                </div>
              </div>
            `;
          }
        }

        if (!rows.length) {
          if (statusEl) statusEl.textContent = '';
          tableEl.innerHTML = '<div style="text-align:center;color:#999;">אין נתונים</div>';
          return;
        }

        const body = rows.map(row => {
          const balanceColor = row.balance >= 0 ? '#27ae60' : '#e74c3c';
          const cumulativeColor = row.cumulativeBalance >= 0 ? '#27ae60' : '#e74c3c';
          const monthKey = row.key;
          const monthPayments = Array.isArray(paymentsByMonth[monthKey]) ? paymentsByMonth[monthKey] : [];
          const paymentsBody = monthPayments.length
            ? monthPayments.map(payment => `
                <tr>
                  <td>${escapeHtml(formatDate(payment.date))}</td>
                  <td style="direction: ltr; text-align: left;">₪${formatCurrency(payment.amount)}</td>
                  <td>${escapeHtml(methodLabel(payment.method || '-'))}</td>
                  <td>${escapeHtml(payment.notes || '')}</td>
                </tr>
              `).join('')
            : '<tr><td colspan="4" style="text-align:center;color:#999;">אין הפקדות</td></tr>';
          return `
            <tr class="mom-row" data-month="${escapeHtml(monthKey)}" style="cursor:pointer;">
              <td style="white-space:nowrap;">${escapeHtml(row.label)}</td>
              <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.obligation)}</td>
              <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.paid)}</td>
              <td style="color:${balanceColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.balance)}</td>
              <td style="color:${cumulativeColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(row.cumulativeBalance)}</td>
              <td style="text-align:center;">${row.isExempt ? 'כן' : ''}</td>
            </tr>
            <tr class="mom-detail" data-month="${escapeHtml(monthKey)}" style="display:none;">
              <td colspan="6" style="padding: 10px 8px; background: #f7f9fb;">
                <div style="font-weight: 600; margin-bottom: 6px;">הפקדות אסתר ומיכאל</div>
                <table class="payments-table">
                  <thead>
                    <tr>
                      <th>תאריך</th>
                      <th>סכום</th>
                      <th>אופן</th>
                      <th>הערות</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${paymentsBody}
                  </tbody>
                </table>
              </td>
            </tr>
          `;
        }).join('');

        tableEl.innerHTML = `
          <table class="payments-table">
            <thead>
              <tr>
                <th>חודש</th>
                <th>התחייבות</th>
                <th>שולם</th>
                <th>מאזן</th>
                <th>עודף מצטבר</th>
                <th>פטור</th>
              </tr>
            </thead>
            <tbody>
              ${body}
            </tbody>
          </table>
        `;

        tableEl.querySelectorAll('.mom-row').forEach(row => {
          row.addEventListener('click', () => {
            const monthKey = row.getAttribute('data-month');
            const detailRow = tableEl.querySelector(`.mom-detail[data-month="${monthKey}"]`);
            if (!detailRow) return;
            const isOpen = detailRow.style.display !== 'none';
            detailRow.style.display = isOpen ? 'none' : 'table-row';
            row.style.background = isOpen ? '' : '#eef4ff';
          });
        });
        if (statusEl) statusEl.textContent = '';
      } catch (err) {
        if (statusEl) statusEl.textContent = 'שגיאה בטעינת נתונים';
        tableEl.innerHTML = '';
      }
    }

    async function loadSharedExpensesTable() {
      const statusEl = document.getElementById('shared-expenses-public-status');
      const expensesTableEl = document.getElementById('shared-expenses-public-table');
      const contributionsTableEl = document.getElementById('parent-contributions-public-table');
      const balanceTableEl = document.getElementById('shared-expenses-public-balance');
      if (statusEl) statusEl.textContent = 'טוען נתונים...';

      try {
        const res = await fetch('/public/shared-expenses-data');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const expenses = Array.isArray(data?.expenses) ? data.expenses : [];
        const contributions = Array.isArray(data?.contributions) ? data.contributions : [];
        const monthly = Array.isArray(data?.monthly) ? data.monthly : [];

        if (!expenses.length) {
          expensesTableEl.innerHTML = '<div style="text-align:center;color:#999;">אין נתונים</div>';
        } else {
          let total = 0;
          const rows = expenses.slice().reverse().map(item => {
            total += Number(item.amount || 0);
            return `
              <tr>
                <td>${escapeHtml(formatDate(item.date))}</td>
                <td>${escapeHtml(item.apartmentNumber || '-')}</td>
                <td>${escapeHtml(item.tenantName || '-')}</td>
                <td>${escapeHtml(item.description || '')}</td>
                <td style="direction: ltr; text-align: left;">₪${formatCurrency(item.amount)}</td>
              </tr>
            `;
          }).join('');
          expensesTableEl.innerHTML = `
            <table class="payments-table">
              <thead>
                <tr><th>תאריך</th><th>דירה</th><th>דייר</th><th>תיאור ההוצאה</th><th>סכום</th></tr>
              </thead>
              <tbody>
                ${rows}
                <tr style="font-weight:bold;border-top:2px solid #333;">
                  <td colspan="4">סה"כ:</td>
                  <td style="direction: ltr; text-align: left;">₪${formatCurrency(total)}</td>
                </tr>
              </tbody>
            </table>
          `;
        }

        if (!contributions.length) {
          contributionsTableEl.innerHTML = '<div style="text-align:center;color:#999;">אין נתונים</div>';
        } else {
          let total = 0;
          const rows = contributions.slice().reverse().map(item => {
            total += Number(item.amount || 0);
            return `
              <tr>
                <td>${escapeHtml(formatDate(item.date))}</td>
                <td>${escapeHtml(item.description || '')}</td>
                <td style="direction: ltr; text-align: left;">₪${formatCurrency(item.amount)}</td>
                <td>${escapeHtml(item.notes || '')}</td>
              </tr>
            `;
          }).join('');
          contributionsTableEl.innerHTML = `
            <table class="payments-table">
              <thead>
                <tr><th>תאריך</th><th>תיאור השתתפות אמא ואבא</th><th>סכום</th><th>הערות</th></tr>
              </thead>
              <tbody>
                ${rows}
                <tr style="font-weight:bold;border-top:2px solid #333;">
                  <td>סה"כ:</td>
                  <td></td>
                  <td style="direction: ltr; text-align: left;">₪${formatCurrency(total)}</td>
                  <td></td>
                </tr>
              </tbody>
            </table>
          `;
        }

        if (!monthly.length) {
          balanceTableEl.innerHTML = '<div style="text-align:center;color:#999;">אין נתונים</div>';
        } else {
          const last = monthly[monthly.length - 1];
          const summaryColor = last.cumulativeBalance > 0 ? '#1b5e20' : (last.cumulativeBalance < 0 ? '#b71c1c' : '#666');
          const summaryLabel = last.cumulativeBalance > 0
            ? `להורים זכות: ₪${formatCurrency(last.cumulativeBalance)}`
            : (last.cumulativeBalance < 0 ? `להורים חוב: ₪${formatCurrency(Math.abs(last.cumulativeBalance))}` : 'מאוזן');

          const rows = monthly.map(m => {
            const balanceColor = m.balance >= 0 ? '#27ae60' : '#e74c3c';
            const cumulativeColor = m.cumulativeBalance >= 0 ? '#27ae60' : '#e74c3c';
            return `
              <tr>
                <td style="white-space:nowrap;">${escapeHtml(m.label)}</td>
                <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(m.totalExpenses)}</td>
                <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(m.parentObligation)}</td>
                <td style="white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(m.received)}</td>
                <td style="color:${balanceColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(m.balance)}</td>
                <td style="color:${cumulativeColor};font-weight:bold;white-space:nowrap;direction: ltr; text-align: left;">₪${formatCurrency(m.cumulativeBalance)}</td>
              </tr>
            `;
          }).join('');
          balanceTableEl.innerHTML = `
            <div style="background:#f5f5f5;border-radius:6px;padding:12px 16px;margin-bottom:10px;font-weight:bold;font-size:16px;color:${summaryColor};">
              ${summaryLabel}
            </div>
            <details>
              <summary style="cursor:pointer;color:#666;font-size:13px;margin-bottom:8px;">הצג פירוט חודשי (${monthly.length} חודשים)</summary>
              <table class="payments-table" style="margin-top:8px;">
                <thead>
                  <tr><th>חודש</th><th>הוצאות משותפות</th><th>התחייבות הורים (40%)</th><th>התקבל מההורים</th><th>יתרה חודשית</th><th>יתרה מצטברת</th></tr>
                </thead>
                <tbody>${rows}</tbody>
              </table>
            </details>
          `;
        }

        if (statusEl) statusEl.textContent = '';
      } catch (err) {
        if (statusEl) statusEl.textContent = 'שגיאה בטעינת נתונים';
      }
    }

    loadMomTable();
    loadSharedExpensesTable();
  </script>
</body>
</html>
